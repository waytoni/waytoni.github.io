name: Check YouTube Channel for New Videos

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: '0 6 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  check-youtube-channel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.11'

      - name: Check for new videos
        id: check
        run: python scripts/check_yt_channel.py
          python build_it.py

      - name: Commit new entries (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit if there are actual changes to tracked files
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add -A
            git commit -m "auto: added new YouTube video entries"
            git push
          fi
