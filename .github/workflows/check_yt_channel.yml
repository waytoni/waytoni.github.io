name: Check YouTube Channel for New Videos

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: '0 6 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  check-youtube-channel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for new videos
        id: check
        run: python scripts/check_yt_channel.py

      - name: Rebuild HTML pages
        if: steps.check.outputs.new_videos == 'true'
        run: python build_it.py

      - name: Commit changes (if any)
        if: steps.check.outputs.new_videos == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: added new YouTube video entries"
            git push
          fi
