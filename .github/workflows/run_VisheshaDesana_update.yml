name: Update Vishesha Deshana series 

on:
  push:
    paths:
      - 'VisheshaDeshana/vishesha_desana_info.txt'     
      - 'scripts/templates/VisheshaDesana_template.html'       
   
jobs:
  run-python-script-VisheshaDesana:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11 # Set your desired Python version

      - name: Update Vishesha Desana series
        run: python scripts/gen_VisheshaDesana.py

      - name: commit changes
        run: |
          git config user.name "$(git log -n 1 --pretty=format:%an)"
          git config user.email "$(git log -n 1 --pretty=format:%ae)"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "updated Vishesha Desana series"
            git push
          fi
