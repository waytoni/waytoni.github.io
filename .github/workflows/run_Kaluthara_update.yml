name: Update L series Lesson Links

on:
  push:
    paths:
      - 'KalutaraBodhiya/L_series/L_series_ytlinks.txt'     
      - 'KalutaraBodhiya/L_series/L_series_notes.txt'     
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  run-python-script-L-series:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11 # Set your desired Python version

      - name: Update Kaluthara Bohiya L_serires
        run: python scripts/gen_series_KalutharaL.py

      - name: commit changes
        run: |
          git config user.name "$(git log -n 1 --pretty=format:%an)"
          git config user.email "$(git log -n 1 --pretty=format:%ae)"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "updated L series"
            git push
          fi
