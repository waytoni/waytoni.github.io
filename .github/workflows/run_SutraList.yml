name: Update Suthra Pathrika List on documennts/SutraPDFs Folder Change

on:
  push:
    branches:
      - main
    paths:
      - 'documents/SutraPDFs/**'

jobs:
  run-SuthraPathrika-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11 # Set your desired Python version

      - name: run Suthra Pathrika update 
        run: python scripts/gen_SutraList.py

      - name: commit changes
        run: |
          git config user.name "$(git log -n 1 --pretty=format:%an)"
          git config user.email "$(git log -n 1 --pretty=format:%ae)"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Updated Suthra Pathrika List"
            git push
          fi
