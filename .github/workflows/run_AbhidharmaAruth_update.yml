name: Update Abhidhamma Aruth Desana

on:
  push:
    paths:    
      - 'AbhidharmaAruth/E_series/AbhidharmaAruth_E_ytlinks.txt'   
      - 'AbhidharmaAruth/E_series/AbhidharmaAruth_E_notes.txt'  
jobs:
  run-python-script-Abhidhamma-Aruth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11 # Python Version

      - name: Update Abhidharma Aruth Desana E seeries
        run: python scripts/gen_series_AbhidharmaAruthE.py
     
      - name: commit changes
        run: |
          git config user.name "$(git log -n 1 --pretty=format:%an)"
          git config user.email "$(git log -n 1 --pretty=format:%ae)"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "updated Abhidhamma Aruth Desana E Series"
            git push
          fi